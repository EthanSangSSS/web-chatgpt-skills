name: catalog-check

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate-catalog:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Validate skill catalog and public-review files
        run: python3 scripts/validate_catalog.py

      - name: Run public-safety scan
        run: python3 scripts/check_public_safety.py

      - name: Run unsafe-claim regression fixtures
        run: python3 scripts/check_unsafe_claims.py

      - name: Validate delayed reflection contract fixtures
        run: python3 scripts/check_delayed_reflection_contract.py

      - name: List changed skill entrypoints for reviewer attention
        run: python3 scripts/list_changed_skills.py
