name: release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Validate catalog
        run: python3 scripts/validate_catalog.py

      - name: Run public-safety scan
        run: python3 scripts/check_public_safety.py

      - name: Run unsafe-claim regression fixtures
        run: python3 scripts/check_unsafe_claims.py

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          notes_file="docs/releases/${GITHUB_REF_NAME}.md"
          if [ ! -f "$notes_file" ]; then
            echo "Missing release notes: $notes_file" >&2
            exit 1
          fi
          gh release create "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --title "$GITHUB_REF_NAME — Public OSS readiness baseline" \
            --notes-file "$notes_file" \
            --verify-tag
