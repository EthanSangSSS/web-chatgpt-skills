version: 1
updated_at: "2026-07-14"
repository: EthanSangSSS/web-chatgpt-skills
purpose: >-
  Machine-readable registry for Web ChatGPT-oriented skills. Every package is
  self-contained at <skill>/SKILL.md and designed to be read remotely from
  GitHub and executed from conversation context, uploaded files, GitHub connector
  data, and web search when available. No skill may assume local terminal, local
  filesystem, credentials, MCP servers, or background execution unless those
  capabilities are explicitly available in the current ChatGPT surface and
  verified by a tool result.

maintenance:
  primary_entrypoint: CATALOG.yaml
  reviewer_fast_path: docs/CODEX_FOR_OSS_APPLICATION.md
  maintainer_runbook: docs/MAINTAINER_RUNBOOK.md
  validation_command: python3 scripts/validate_catalog.py
  license: MIT
  public_review_policy: >-
    Public-facing claims should be evidence-bounded. Do not claim stars,
    downloads, production adoption, local execution, test results, or security
    review results unless verified evidence exists.

execution_defaults:
  local_terminal: prohibited
  local_filesystem: prohibited
  background_work: prohibited
  secrets_handling: never_request_or_store
  evidence_rule: do_not_claim_unverified_execution
  handoff_rule: >-
    When a task requires local file edits, shell commands, build/test execution,
    credentials, local services, or multi-file repository changes beyond safe
    GitHub connector edits, stop direct execution and produce a bounded local
    agent handoff with repo, branch, HEAD/PR metadata if available, file scope,
    forbidden actions, validation commands, stop conditions, and final output format.

skills:
  - id: architecture-diagram
    path: architecture-diagram/SKILL.md
    status: stable
    priority: P0
    category: software-architecture
    triggers: [architecture diagram, system diagram, C4, deployment diagram, data flow, trust boundary, 架构图, 系统图]
    do_not_use_for: [decorative illustration, pure UI mockup, product purchase decision]

  - id: systematic-debugging
    path: systematic-debugging/SKILL.md
    status: stable
    priority: P0
    category: software-debugging
    triggers: [bug, error, crash, traceback, log analysis, startup failure, 报错, 启动失败, 崩溃]
    do_not_use_for: [feature planning without a failure, product purchase decision]

