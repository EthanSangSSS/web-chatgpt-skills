    path: upload-packages/architecture-diagram/SKILL.md
    status: stable
    priority: P0
    category: software-architecture
    triggers: [architecture diagram, system diagram, C4, deployment diagram, data flow, trust boundary, 架构图, 系统图]
    do_not_use_for: [decorative illustration, pure UI mockup, product purchase decision]

